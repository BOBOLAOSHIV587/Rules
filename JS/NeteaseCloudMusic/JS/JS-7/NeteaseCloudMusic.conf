#!name= 网易云音乐去广告
#!desc=全面净化 - 自定义Tab名称 - 伪VIP
#!date=2026-05-01
#!category=🐹 BOBO Premium
#!author= baby[https://github.com/Yu9191/NeteasemusicAd]
#!icon=https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/Icons/AppIcons/Image/App/NeteaseMusic.png
#!openUrl = https://apps.apple.com/app/id590338362

[filter_local]
host, iadmusicmat.music.126.net, reject
host, iadmat.nosdn.127.net, reject
host, iadmatapk.nosdn.127.net, reject
host, httpdns.n.netease.com, reject
host, httpdns.music.163.com, reject

[rewrite_local]
# 通用接口 | 评论区、广告、红点等
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/(batch|v\d\/resource\/comment\/floor\/get) url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js

# 伪VIP逻辑 (VipEnabled=1开启/0关闭; VipLevel=1-7; GrowthValue=成长值; VipExpire=到期时间，支持日期或毫秒时间戳)
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/(music-vip-membership\/(client|front)\/vip\/info|vipnewcenter\/app\/resource\/newaccountpage|vip-center-bff\/(card\/entry\/list|float\/data|quality\/auth\/info)|v1\/user\/info) url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js#VipEnabled=1&VipLevel=7&GrowthValue=99999&VipExpire=2099-09-09

# 免流量包伪造 + 流量推广弹窗清空
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/sp\/flow\/(status\/v2|popup\/query) url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js#VipEnabled=1&VipExpire=2099-09-09

# 底部 Tab (FX/MY/DT/GZ: 1=隐藏, 0=显示; SY_NAME/WD_NAME/MY_NAME 等: 自定义名称, 0=保持原名)
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/link\/home\/framework\/tab url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js#FX=0&MY=1&DT=0&GZ=1&SOU=1&SY_NAME=0&WD_NAME=0&MY_NAME=0&DT_NAME=0&FX_NAME=0

# 顶部 Tab (AIXG=AI写歌, HDTAB=活动Tab: 0=隐藏, 1=显示)
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/link\/home\/framework\/top\/tab url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js#AIXG=0&HDTAB=0

# 收银台广告
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/vipactivity\/app\/cashier\/setting\/get url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js

# 首页推荐 (1=显示, 0=隐藏)
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/(homepage\/block\/page|link\/page\/rcmd\/(resource\/show|block\/resource\/multi\/refresh)) url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js#PRGG=0&PRDRD=0&PRSCVPT=0&PRST=0&HMPR=0&PRRR=1&PRRK=0&PRMST=0&PRCN=1&PRPRS=1&PRRSS=1

# 发现页
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/link\/page\/discovery\/resource\/show url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js

# 我的页面广告 (MyPageBar)
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/link\/position\/show\/resource url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js

# 关注列表 (显示未关注)
^https?:\/\/(ipv4|interface\d?)\.music\.163\.com\/e?api\/user\/follow\/users\/mixed\/get url script-response-body https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/JS/NeteaseCloudMusic/JS/JS-7/JS/NeteaseCloudMusic.js

[mitm]
hostname = ipv4.music.163.com, interface.music.163.com, interface3.music.163.com
