#!name=Google搜索重定向
#!desc=将Google搜索重定向至.com域名.\n如遇频繁跳转请禁用本插件。
#!date=2026-05-13
#!category=🐹 BOBO Enhance
#!author=可莉🅥[https://github.com/luestr/ProxyResource/blob/main/README.md]
#!icon=https://raw.githubusercontent.com/BOBOLAOSHIV587/Rules/main/Icons/AppIcons/Image/App/Google.png
#!openUrl=https://www.google.com

[rewrite_local]
# > 谷歌搜索重定向
^https?:\/\/(www.)?(g|google)\.cn url 302 https://www.google.com
^https?:\/\/(www.)?(g|google)\.cn url 307 https://www.google.com
^https?:\/\/(ditu|maps).google\.cn url 302 https://maps.google.com
^https?:\/\/(ditu|maps).google\.cn url 307 https://maps.google.com
^https?:\/\/(www.)?(g|google)\.com.hk url 302 https://www.google.com
^https?:\/\/(www.)?(g|google)\.com.hk url 307 https://www.google.com

[mitm]
hostname = www.google.cn, *.google.com.hk , *.g.cn
